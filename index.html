<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fruit box</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <main>
        <p>Fruit box</p>
        <div class="fruit-box">
            <div class="apple">Apple</div>
            <div class="kiwi">Kiwi</div>
            <div class="mango">Mango</div>
            <div class="orange">Orange</div>
        </div>

        <p>Apartment</p>
        <div class="container">
            <div class="room" id="living-room">Living Room</div>
            <div class="room" id="kitchen">Kitchen</div>
            <div class="room" id="bedroom">Bedroom</div>
            <div class="room" id="bathroom">Bathroom</div>
            <div class="room" id="closet">Closet</div>
        </div>
    </main>
</body>
</html>
